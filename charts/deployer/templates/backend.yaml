# Service Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-deployer-backend
  labels:
    kalavai.job.name: {{ .Values.system.jobId | default .Release.Name }}
    component: backend
spec:
  replicas: {{ .Values.deployer.service.replicas }}
  selector:
    matchLabels:
      kalavai.job.name: {{ .Values.system.jobId | default .Release.Name }}
      component: backend
  template:
    metadata:
      labels:
        kalavai.job.name: {{ .Values.system.jobId | default .Release.Name }}
        component: backend
        role: leader
    spec:
      terminationGracePeriodSeconds: 10
      {{- if .Values.system.priorityClassName }}
      priorityClassName: {{ .Values.system.priorityClassName }}
      {{- end }}
      tolerations:
      - key: "node.kubernetes.io/not-ready"
        operator: Exists
        effect: NoExecute
        tolerationSeconds: 10
      - key: "node.kubernetes.io/unreachable"
        operator: Exists
        effect: NoExecute
        tolerationSeconds: 10
      - key: "node.kubernetes.io/unknown"
        operator: Exists
        effect: NoExecute
        tolerationSeconds: 10
      - key: "node.kubernetes.io/memory-pressure"
        operator: Exists
        effect: NoSchedule
      - key: "node.kubernetes.io/disk-pressure"
        operator: Exists
        effect: NoSchedule
      - key: "node.kubernetes.io/pid-pressure"
        operator: Exists
        effect: NoSchedule
      - key: "node.kubernetes.io/network-unavailable"
        operator: Exists
        effect: NoSchedule
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: kalavai.job.name
                  operator: In
                  values:
                  - {{ .Values.system.jobId | default .Release.Name }}
              topologyKey: "kubernetes.io/hostname"
      {{- if .Values.system.nodeSelectors }}
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            {{- if eq .Values.system.nodeSelectorsOps "OR" }}
              {{- range .Values.system.nodeSelectors }}
              - matchExpressions:
                - key: {{ .name }}
                  operator: In
                  values:
                  {{- range .value }}
                  - "{{ . }}"
                  {{- end }}
              {{- end }}
            {{- else }}
              - matchExpressions:
              {{- range .Values.system.nodeSelectors }}
                {{- range .value }}
                - key: {{ .name }}
                  operator: In
                  values:
                  - "{{ . }}"
                {{- end }}
              {{- end }}
            {{- end }}
      {{- end }}
      containers:
      - name: backend
        image: "ghcr.io/kalavai-net/kalavai-deployer:latest"
        imagePullPolicy: {{ .Values.deployer.service.image.pullPolicy }}
        command:
        - sh
        - -c
        - |
          echo "Deploying server..."
          python backend/main.py --host 0.0.0.0 --port 8000
        env:
        {{- if .Values.system.envFromSecrets }}
        {{- range .Values.system.envFromSecrets }}
        - name: {{ . }}
          valueFrom:
            secretKeyRef:
              name: {{ . }}
              key: {{ . }}
        {{- end }}
        {{- end }}
        - name: MASTER_API_KEY
          valueFrom:
            secretKeyRef:
              name: {{ .Release.Name }}-deployer-secrets
              key: deployer_master_key
        - name: KALAVAI_API_ENDPOINT
          value: {{ .Values.deployer.kalavaiApi.endpoint | quote }}
        - name: KALAVAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: {{ .Release.Name }}-deployer-secrets
              key: kalavai_api_key
        - name: PUBLIC_LITELLM_URL
          value: {{ .Values.deployer.gateway.publicUrl | quote }}
        - name: LITELLM_BASE_URL
          {{- if .Values.deployer.gateway.internalUrl }}
          value: {{ .Values.deployer.gateway.internalUrl | quote }}
          {{- else }}
          value: {{ .Values.deployer.gateway.publicUrl | quote }}
          {{- end }}
        - name: LITELLM_KEY
          valueFrom:
            secretKeyRef:
              name: {{ .Release.Name }}-deployer-secrets
              key: litellm_key
        - name: LITELLM_USERNAME
          valueFrom:
            secretKeyRef:
              name: {{ .Release.Name }}-deployer-secrets
              key: litellm_ui_username
        - name: LITELLM_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Release.Name }}-deployer-secrets
              key: litellm_ui_password
        - name: HF_TOKEN_SECRET
          value: {{ .Values.hfTokenSecret }} 
        - name: USER_ID
          value: {{ .Release.Namespace }}
        - name: MEMORY_CAP_PERCENTAGE
          value: {{ .Values.deployer.memoryCapPercentage | quote }}
        ports:
        - containerPort: 8000
          name: container-port
        # startupProbe:
        #   httpGet:
        #     path: /v1/health
        #     port: 8000
        #   initialDelaySeconds: 50
        #   periodSeconds: 60
        #   timeoutSeconds: 2
        #   failureThreshold: 5
        # livenessProbe:
        #   httpGet:
        #     path: /v1/health
        #     port: 8000
        #   initialDelaySeconds: 100
        #   periodSeconds: 90
        #   timeoutSeconds: 2
        #   failureThreshold: 2
        # readinessProbe:
        #   httpGet:
        #     path: /v1/health
        #     port: 8000
        #   initialDelaySeconds: 20
        #   periodSeconds: 120
        #   timeoutSeconds: 1
        #   failureThreshold: 2
        resources:
          requests:
            cpu: 1
            memory: 1Gi
          limits:
            cpu: 1
            memory: 1Gi
      restartPolicy: Always
