# Service for API
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-deployer-backend-service
  labels:
    kalavai.job.name: {{ .Values.system.jobId | default .Release.Name }}
spec:
  type: ClusterIP
  selector:
    component: backend
    kalavai.job.name: {{ .Values.system.jobId | default .Release.Name }}
  ports:
  - name: main
    port: 8000
    targetPort: 8000
    protocol: TCP
---
# deploy NodePort to expose model (if not using LiteLLM registration)
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-deployer-ui-service
  labels:
    # must have this!
    kalavai.job.name: {{ .Values.system.jobId }}
spec:
  selector:
    component: ui
    kalavai.job.name: {{ .Values.system.jobId | default .Release.Name }}
  ports:
    - name: main
      port: 3000
      targetPort: 3000
      protocol: TCP
  {{- if .Values.ingress.enabled }}
  type: ClusterIP
  {{- else }}
  type: NodePort
  {{- end }}
---
{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  # annotations:
  #   traefik.ingress.kubernetes.io/router.middlewares: "{{ .Release.Namespace }}-{{ .Release.Name }}-large-body@kubernetescrd"
  labels:
    kalavai.job.name: {{ .Values.system.jobId }}
  name: {{ .Release.Name }}-deployer-ui-ingress
spec:
  ingressClassName: traefik
  rules:
  - host: {{ .Release.Name }}-{{ .Release.Namespace }}-deployer-ui.{{ .Values.ingress.subdomain }}
    http:
      paths:
      - backend:
          service:
            name: {{ .Release.Name }}-deployer-ui-service
            port:
              number: 3000 # match internal port
        path: /
        pathType: Prefix
{{- end }}