apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-gateway-config
  labels:
    kalavai.job.name: {{ .Values.system.jobId | default .Release.Name }}
data:
  config.yaml: |
    litellm_settings:
      num_retries: {{ .Values.litellm.litellm_settings.num_retries | default 3 }}
      request_timeout: {{ .Values.litellm.litellm_settings.request_timeout | default 9000 }}
      # success_callback: ["langfuse"]
      # failure_callback: ["langfuse"]
      # redacts messages and response content
      turn_off_message_logging: {{ .Values.litellm.litellm_settings.turn_off_message_logging | default false }} 
    {{- if .Values.redis.enabled }}
      cache: true
      cache_params:
        type: redis
        host: {{ .Release.Name }}-gateway-redis-service
        port: 6379
        password: os.environ/REDIS_PASSWORD
        namespace: "litellm.caching.caching"
    {{- end }}

    # https://docs.litellm.ai/docs/proxy/config_settings#router_settings---reference
    router_settings:
      routing_strategy: least-busy 
    {{- if .Values.redis.enabled }}
      redis_host: {{ .Release.Name }}-gateway-redis-service
      redis_port: 6379
      redis_password: os.environ/REDIS_PASSWORD
    {{- end }}

    callback_settings:
      otel:
        message_logging: {{ .Values.litellm.callback_settings.otel.message_logging | default false }}

    general_settings:
      always_include_stream_usage: true # required to track reasoning tokens on streaming calls
      background_health_checks: False
      store_prompts_in_spend_logs: {{ .Values.litellm.general_settings.store_prompts_in_spend_logs | default false }}
      disable_prisma_schema_update: {{ .Values.litellm.general_settings.disable_prisma_schema_update | default false }}
      disable_error_logs: {{ .Values.litellm.general_settings.disable_error_logs | default false }}
      disable_spend_logs: {{ .Values.litellm.general_settings.disable_spend_logs | default false }}
      #maximum_spend_logs_retention_period: "90d"  # Delete logs older than X days
      #enforce_user_param: true
      # database_connection_pool_limit: {{ .Values.litellm.general_settings.database_connection_pool_limit }}
      # database_connection_timeout: {{ .Values.litellm.general_settings.database_connection_timeout }}
      # allow_requests_on_db_unavailable: {{ .Values.litellm.general_settings.allow_requests_on_db_unavailable }}

    # https://docs.litellm.ai/docs/proxy/config_settings#environment-variables---reference
    # env:
    #   - name: DISABLE_SCHEMA_UPDATE
    #     value: "true"

    #   # OPTIONAL Best Practices
    #   disable_spend_logs: True # turn off writing each transaction to the db. We recommend doing this is you don't need to see Usage on the LiteLLM UI and are tracking metrics via Prometheus
    #   disable_error_logs: True # turn off writing LLM Exceptions to DB
    #   allow_requests_on_db_unavailable: True # Only USE when running LiteLLM on your VPC. Allow requests to still be processed even if the DB is unavailable. We recommend doing this if you're running LiteLLM on VPC that cannot be accessed from the public internet.

      
