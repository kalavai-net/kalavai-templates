{{- if .Values.redis.enabled }}
# Redis for fault tolerance
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-gateway-redis-service
  labels:
    app: {{ .Release.Name }}-gateway-redis
    kalavai.job.name: {{ .Values.system.jobId }}
spec:
  selector:
    app: {{ .Release.Name }}-gateway-redis
    kalavai.job.name: {{ .Values.system.jobId }}
  type: ClusterIP
  ports:
  - name: redis
    port: 6379
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-gateway-redis
  labels:
    app: {{ .Release.Name }}-gateway-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Release.Name }}-gateway-redis
      kalavai.job.name: {{ .Values.system.jobId }}
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-gateway-redis
        kalavai.job.name: {{ .Values.system.jobId }}
    spec:
      priorityClassName: "kalavai-system-priority"
      containers:
      - name: redis
        image: redis:7.4.0
        command:
        - "sh"
        - "-c"
        - |
          redis-server --requirepass $REDIS_PASSWORD
        ports:
        - containerPort: 6379
        env:
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{.Release.Name }}-gateway-secret
              key: redis_password
{{- end }}