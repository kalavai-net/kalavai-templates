# https://github.com/jupyterhub/zero-to-jupyterhub-k8s/issues/447
# https://github.com/jupyterhub/zero-to-jupyterhub-k8s/blob/d3f1723eab7cf3cf737ce416e71321ec8c01a922/jupyterhub/values.yaml#L339

# imagePullSecrets:
# - "regcred"

proxy:
  service:
    type: NodePort

hub:
  config:
    Authenticator:
      admin_users:
        - carlos_admin
      Jupyterhub:
        admin_access: true
  image:
    name: jupyterhub/k8s-hub
    tag: "4.3.1" # https://hub.docker.com/r/jupyterhub/k8s-hub/tags?page=2
    #name: docker.io/bundenth/jupyterhub_hub
    #tag: "v1"
#     pullSecrets:
#     - "regcred"
#     #name: docker.io/cschranz/gpu-jupyter # jupyterhub/k8s-singleuser-sample #docker.io/zonca/nvidia-tensorflow-jupyterhub # 
#     #tag: "v1.5_cuda-11.6_ubuntu-20.04_slim" #"23.1.5"
#   # https://z2jh.jupyter.org/en/latest/resources/reference.html#schema-hub-extraconfig

singleuser:

  # cmd: 
  #   - "sh"
  #   - "-c"
  #   - |
  #     echo "Starting custom initialization..."
  #     sudo apt-get update
  #     sudo apt-get install -y net-tools iputils-ping
  #     echo "Initialization complete. Starting Jupyter..."
  #     # This last line is critical to keep the container running
  #     jupyterhub-singleuser --port=8888
  startTimeout: 3600
  # Allocate GPU resources
  profileList:
    - display_name: "GPU Server"
      default: true
      description: "Spawns a notebook server with access to a GPU"
      kubespawner_override:
        # imagePullSecrets:
        # - "regcred"
        image: docker.io/cschranz/gpu-jupyter:v1.10_cuda-12.9_ubuntu-24.04_slim
        extra_resource_limits:
          nvidia.com/gpu: "1"
        # Allow sudo access
        environment:
          GRANT_SUDO: "yes"
        args:
        - "--allow-root"
        uid: 0
        privileged: false # error allowPrivilegeEscalation: false
    - display_name: "CPU only"
      description: "Spawns a notebook server (CPU only)"

  # establish resource limits
  memory:
    limit: 8G
    guarantee: 2G
  cpu:
    limit: 4
    guarantee: 2
  # define persistent storage
  storage:
    capacity: 4Gi
    dynamic:
      storageClass: local-path
    homeMountPath: /home/user
  
  # auto culling inactive servers https://z2jh.jupyter.org/en/latest/jupyterhub/customizing/user-management.html#culling-user-pods
  extraFiles:
    init-script:
      mountPath: /usr/local/bin/before-notebook.d/init-script.sh
      mode: 0755
      stringData: |
        #!/bin/bash
        echo "Initializing..."
        # Add your initialization commands here
        sudo apt update && sudo apt install net-tools -y
    # jupyter_notebook_config reference: https://jupyter-notebook.readthedocs.io/en/stable/config.html
    jupyter_notebook_config.json:
      mountPath: /etc/jupyter/jupyter_notebook_config.json
      # data is a YAML structure here but will be rendered to JSON file as our
      # file extension is ".json".
      data:
        MappingKernelManager:
          # cull_idle_timeout: timeout (in seconds) after which an idle kernel is
          # considered ready to be culled
          cull_idle_timeout: 1200 # default: 0
          # cull_interval: the interval (in seconds) on which to check for idle
          # kernels exceeding the cull timeout value
          cull_interval: 120 # default: 300
          # cull_connected: whether to consider culling kernels which have one
          # or more connections
          cull_connected: true # default: false
          # cull_busy: whether to consider culling kernels which are currently
          # busy running some code
          cull_busy: false # default: false

scheduling:
  # Enable the user scheduler, to pack users tight on some nodes and let other nodes become empty and scaled down.
  userScheduler:
    enabled: false
  # Enable pod priority and add user placeholders, to scale up nodes ahead of real users’ arrivals 
  userPlaceholder:
    enabled: true
    replicas: 1
  podPriority:
    enabled: true

#Enable the continuous image puller, to prepare added nodes for arriving users.
prePuller:
  hook:
    enabled: false
  continuous:
    # NOTE: if used with a Cluster Autoscaler, also add user-placeholders
    enabled: false