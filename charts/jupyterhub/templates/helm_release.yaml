apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: {{ .Release.Name}}-api
  labels:
    kalavai.job.name: {{ .Values.system.jobId}}
spec:
  interval: 10m
  chart:
    spec:
      chart: jupyterhub
      version: "4.3.2"
      sourceRef:
        kind: HelmRepository
        name: jupyterhub-repo-{{ .Release.Name }}
        namespace: {{ .Release.Namespace }}
  values:
    fullnameOverride: {{ .Release.Name }}
    nameOverride: {{ .Release.Name }}
    proxy:
      service:
        {{- if .Values.ingress.enabled }}
        type: ClusterIP
        {{- else }}
        type: NodePort
        {{- end }}
        labels:
          kalavai.job.name: {{ .Values.system.jobId}}
    hub:
      labels:
        kalavai.job.name: {{ .Values.system.jobId}}
      config:
        Authenticator:
          admin_users:
            - {{ .Values.singleuser.adminUsername }}
          allowed_users:
            - {{ .Values.singleuser.username }}
          DummyAuthenticator:
            password: "{{ .Values.singleuser.password }}"
          Jupyterhub:
            authenticator_class: dummy
            admin_access: true
      image:
        name: jupyterhub/k8s-hub
        tag: "4.3.1"
    singleuser:
      networkPolicy:
        enabled: true
        egress:
        # 1. Allow DNS resolution (Crucial!)
        - to: []
          ports:
          - port: 53
            protocol: UDP
          - port: 53
            protocol: TCP
        # 2. Allow traffic to everything within the SAME namespace
        - to:
          - namespaceSelector:
              matchLabels:
                kubernetes.io/metadata.name: {{ .Release.Namespace }}
      extraEnv:
      {{- if .Values.distributed.enabled }}
        JH_ENV: "distributed"
        RAY_ENDPOINT: ray://{{ .Release.Name }}-jh-ray-raycluster-head-svc:10001
      {{- else }}
        JH_ENV: "local"
      {{- end }}
      extraLabels:
        kalavai.job.name: {{ .Values.system.jobId}}
      startTimeout: 7200
      # Allocate GPU resources
      profileList:
      {{- if .Values.distributed.enabled }}
        - display_name: "CPU only"
          description: "Spawns a notebook server (connect to Ray to access GPUs)"
          kubespawner_override:
          {{- if .Values.singleuser.image.imagePullSecrets }}
            imagePullSecrets:
            {{- range .Values.singleuser.image.imagePullSecrets }}
              - {{ . }}
            {{- end }}
          {{- end }}
            image: {{ .Values.singleuser.image.cpu.name }}
      {{- else }}
        - display_name: "GPU Server"
          default: true
          description: "Spawns a notebook server with access to a GPU"
          kubespawner_override:
          {{- if .Values.singleuser.image.imagePullSecrets }}
            imagePullSecrets:
            {{- range .Values.singleuser.image.imagePullSecrets }}
              - {{ . }}
            {{- end }}
          {{- end }}
            image: {{ .Values.singleuser.image.gpu.name }}
            extra_resource_limits:
              nvidia.com/gpu: "1"
            # Allow sudo access
            environment:
              GRANT_SUDO: "yes"
            args:
            - "--allow-root"
            uid: 0
            privileged: false # error allowPrivilegeEscalation: false
      {{- end }}
      # establish resource limits
      memory:
        limit: {{ .Values.singleuser.memory }}G
        guarantee: {{ .Values.singleuser.memory }}G
      cpu:
        limit: {{ .Values.singleuser.cpu }}
        guarantee: {{ .Values.singleuser.cpu }}
      # define persistent storage
      storage:
        capacity: "{{ .Values.singleuser.storageCapacity }}Gi"
        dynamic:
          storageClass: {{ .Values.singleuser.storageClass }}
        homeMountPath: /home/user
      # auto culling inactive servers https://z2jh.jupyter.org/en/latest/jupyterhub/customizing/user-management.html#culling-user-pods
      extraFiles:
        init-script:
          mountPath: /usr/local/bin/before-notebook.d/init-script.sh
          mode: 0755
          stringData: {{ .Values.singleuser.initScript | quote }}
        # jupyter_notebook_config reference: https://jupyter-notebook.readthedocs.io/en/stable/config.html
        jupyter_notebook_config.json:
          mountPath: /etc/jupyter/jupyter_notebook_config.json
          # data is a YAML structure here but will be rendered to JSON file as our
          # file extension is ".json".
          data:
            MappingKernelManager:
              # cull_idle_timeout: timeout (in seconds) after which an idle kernel is
              # considered ready to be culled
              cull_idle_timeout: 1200 # default: 0
              # cull_interval: the interval (in seconds) on which to check for idle
              # kernels exceeding the cull timeout value
              cull_interval: 120 # default: 300
              # cull_connected: whether to consider culling kernels which have one
              # or more connections
              cull_connected: true # default: false
              # cull_busy: whether to consider culling kernels which are currently
              # busy running some code
              cull_busy: false # default: false
    scheduling:
      # Enable the user scheduler, to pack users tight on some nodes and let other nodes become empty and scaled down.
      userScheduler:
        enabled: false
      # Enable pod priority and add user placeholders, to scale up nodes ahead of real users’ arrivals 
      userPlaceholder:
        enabled: true
        replicas: 1
      podPriority:
        enabled: true
    #Enable the continuous image puller, to prepare added nodes for arriving users.
    prePuller:
      hook:
        enabled: false
      continuous:
        # NOTE: if used with a Cluster Autoscaler, also add user-placeholders
        enabled: false
---
{{- if .Values.distributed.enabled }}
# distributed environment
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: {{ .Release.Name}}-jh-ray
  labels:
    kalavai.job.name: {{ .Values.system.jobId}}
spec:
  interval: 10m
  chart:
    spec:
      chart: ray-cluster
      version: "0.1.7"
      sourceRef:
        kind: HelmRepository
        name: kalavai-templates
        namespace: {{ .Release.Namespace }}
  values:
    ray:
      cudaVersion: "{{ .Values.distributed.cudaVersion }}"
      idleTimeoutSeconds: {{ .Values.distributed.idleTimeoutSeconds }}
      maxNvidiaWorkers: {{ .Values.distributed.maxGpus }}
      minNvidiaWorkers: {{ .Values.distributed.minGpus }}
      pythonVersion: "{{ .Values.distributed.pythonVersion }}"
      rayVersion: "{{ .Values.distributed.rayVersion }}"
      upscalingMode: Default
    deployment:
      cpus: {{ .Values.singleuser.cpu }}
      gpuMemory: null
      memory: {{ .Values.singleuser.memory }}
    system:
      priorityClassName: {{ .Values.system.priorityClassName }}
      nodeSelectors: {{ .Values.system.nodeSelectors | toYaml }}
      nodeSelectorsOps: {{ .Values.system.nodeSelectorsOps }}
      jobId: {{ .Values.system.jobId | quote }}
    ingress:
      enabled: false
    auth:
      enabled: false


{{- end }}