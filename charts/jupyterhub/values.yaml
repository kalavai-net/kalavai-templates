singleuser:
  username: user
  adminUsername: admin
  password: password
  image:
    cpu:
      name: ghcr.io/kalavai-net/jupyterhub-cpu:latest
    gpu:
      name: docker.io/cschranz/gpu-jupyter:v1.10_cuda-12.9_ubuntu-24.04_slim
    imagePullSecrets: null
  gpuCount: 1
  memory: 8
  cpu: 4
  storageCapacity: 4
  storageClass: "local-path"
  initScript: |
    #!/bin/bash

distributed:
  enabled: false
  rayVersion: 2.52.0
  idleTimeoutSeconds: 60
  minGpus: 0
  maxGpus: 2
  pythonVersion: '312'
  cudaVersion: '128'

ingress:
  enabled: false
  subdomain: spaces.kalavai.net

system:
  priorityClassName: user-spot-priority
  nodeSelectors: null
  nodeSelectorsOps: OR
  jobId: null
  