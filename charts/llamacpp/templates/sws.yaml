apiVersion: kalavai.net/v1
kind: ServerWorkerSet
metadata:
  name: {{ .Release.Name }}-llamacpp
spec:
  replicas: {{ .Values.system.replicas }}
  workersPerInstance: {{ sub .Values.system.workers 1 }}
  labels:
    kalavai.job.name: {{ .Values.system.jobId}}
    {{- if .Values.system.workerGpuMemory }}
    kalavai/vram: {{ .Values.system.workerGpuMemory | quote }}
    {{- end }}
  service:
    name: {{ .Release.Name }}-llamacpp-service
    port: 8080           
    targetPort: 8080     
    stickySession: true  
    stickySessionTimeoutSeconds: 10800
  {{- if .Values.ingress.enabled }}
    type: ClusterIP
  {{- else }}
    type: NodePort
  {{- end }}  
  autoScaling:
    enabled: {{ .Values.autoscaling.enabled }}
  {{- if .Values.autoscaling.enabled }}   
    hosts:
      - {{ .Release.Name }}-{{ .Release.Namespace }}-llamacpp.spaces.kalavai.net    
    pathPrefixes:
      - "/"              
    replicas:
      min: {{ .Values.autoscaling.minReplicas }}        
      max: {{ .Values.autoscaling.maxReplicas }}
    scaledownPeriod: 300
    scalingMetric:
      requestRate:
        granularity: 1s
        targetValue: 1
        window: 1m
      # concurrency:
      #   targetValue: 10
  {{- end }}
  server:
    spec:
      terminationGracePeriodSeconds: 60
    {{- if eq .Values.system.backend "cuda" }}
      runtimeClassName: nvidia
    {{- end }}
      affinity:
      {{- if .Values.system.nodeAffinityPreferenceKey }}
        podAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  kalavai.job.name: {{ .Values.system.jobId }}
              topologyKey: {{ .Values.system.nodeAffinityPreferenceKey }}
      {{- end }}
      {{- if .Values.system.nodeSelectors }}
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
          {{ if eq .Values.system.nodeSelectorsOps "OR" }}
            {{ range $k, $v := .Values.system.nodeSelectors }}
            - matchExpressions:
              - key: {{$k}}
                operator: In
                values:
                {{ range $v }}
                - "{{ . }}"
                {{ end }}
            {{ end }}
          {{ else }}
            - matchExpressions:
            {{ range $k, $v := .Values.system.nodeSelectors }}
              {{ range $v }}
              - key: {{ $k }}
                operator: In
                values:
                - "{{ . }}"
              {{ end }}
            {{ end }}
          {{ end }}
      {{- end }}
      {{- if .Values.billing.enabled }}
      serviceAccountName: kalavai-downstream-api-reader-sa
      {{- end }}
      containers:
      - name: llamacpp-leader
      {{ if eq .Values.system.backend "cuda" }}
        image: ghcr.io/kalavai-net/llamacpp-cuda:{{ .Values.llamacpp.version }}
      {{ else if eq .Values.system.backend "rocm" }}
        image: ghcr.io/kalavai-net/llamacpp-rocm:{{ .Values.llamacpp.version }}
      {{ else }}
        image: ghcr.io/kalavai-net/llamacpp-cpu:{{ .Values.llamacpp.version }}
      {{ end }}
        imagePullPolicy: {{ .Values.llamacpp.imagePullPolicy }}
        command:
        - sh
        - -c
        - |
          echo "Starting server..."
          # run model server
          export WORKERS=$(/workspace/get_workers_address.sh --rpc_port=50052 --rpc_servers="${WORKERS_ADDRESSES}")
          /workspace/run_api_server.sh \
            --repo_id={{ .Values.llamacpp.repoId }} \
            --quant={{ .Values.llamacpp.quant }} \
            --port=8080 \
            --rpc_servers=$WORKERS \
            --extra='{{ .Values.llamacpp.serverExtra}}'
        env:
        {{- range $key, $value := .Values.system.envFromSecrets }}
        - name: {{ $key }}
          valueFrom:
            secretKeyRef:
              name: {{ $value }}
              key: {{ $key }}
        {{- end }}
        {{- if .Values.hfToken }}
        - name: HF_TOKEN
          valueFrom:
            secretKeyRef:
              name: {{ .Release.Name}}-llamacpp-secret
              key: hf_token
        {{- end }}
        ports:
        - containerPort: 8080
          name: model-port
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          requests:
            cpu: {{ .Values.system.cpus}}
            memory: {{ .Values.system.memory}}Gi
          {{ if eq .Values.system.backend "cuda" }}
            nvidia.com/gpu: 1
          {{ else if eq .Values.system.backend "rocm" }}
            amd.com/gpu: 1
          {{ end }}
            ephemeral-storage: {{ .Values.system.workingMemory}}Gi
          limits:
            cpu: {{ .Values.system.cpus}}
            memory: {{ .Values.system.memory}}Gi
          {{ if eq .Values.system.backend "cuda" }}
            nvidia.com/gpu: 1
            # {{ if .Values.system.workerGpuMemory }}
            # nvidia.com/gpumem: {{ .Values.system.workerGpuMemory}}
            # {{ end }}
          {{ else if eq .Values.system.backend "rocm" }}
            amd.com/gpu: 1
          {{ end }}
            ephemeral-storage: {{ .Values.system.workingMemory}}Gi
    {{- if or .Values.billing.enabled .Values.litellm.enabled }}  
      - name: registrar-sidecar
        image: ghcr.io/kalavai-net/kalavai-registrar:latest
        imagePullPolicy: Always
        command:
        - sh
        - -c
        - |
          PS_HOST=`cat /etc/volcano/server.host`;
        {{- if .Values.litellm.enabled }}
          # 1. register model
          echo "REGISTER MODEL WITH GATEWAY..."
          {{- if .Values.litellm.waitReady }}
          /workspace/wait_for_service.sh --servers="$PS_HOST" --port=8080
          {{- else }}
          /workspace/wait_for_ping.sh --servers="$PS_HOST"
          {{- end }}
          export MODEL_API_BASE="http://"$PS_HOST"."$VC_NAMESPACE":8080/v1";
          /workspace/start_point.sh \
            --litellm_kalavai_extras='{{ .Values.litellm.kalavaiExtras }}' \
            --litellm_access_group={{ .Values.litellm.accessGroup }}
        {{- end }}
        {{- if .Values.billing.enabled }}
          # 2. Fetch node Info
          echo "FETCH NODE INFO..."
          REGION=$(python3 get_node_label_value.py --in-cluster --node-name $NODE_NAME --label-key kalavai/region)
          INSTANCE=$(python3 get_node_label_value.py --in-cluster --node-name $NODE_NAME --label-key kalavai/instance)
          echo "REGION: $REGION"
          echo "INSTANCE: $INSTANCE"

          # 3. Wait for model to be ready
          echo "WAIT FOR MODEL TO BE READY at $PS_HOST:8080..."
          /workspace/wait_for_service.sh --servers="$PS_HOST" --port=8080

          # 4. start heartbeat
          # VRAM USAGE / minute = billingInterval(mins) * gpuMemPerWorker  * NumWorkers
          {{- $vramUsage := mul (mul .Values.billing.interval .Values.system.workerGpuMemory) .Values.system.workers }}
          export EVENT_PROPERTIES='{"provider": "'$REGION'", "instance": "'$INSTANCE'", "vram_usage": '{{ $vramUsage }}'}' 
          echo "START HEARTBEAT..."
          python3 billing_heartbeat.py
        {{- else }}
          tail -f /dev/null
        {{- end }}
        env:
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        - name: VC_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
      {{- if .Values.litellm.enabled }}
        - name: LITELLM_MODEL_NAME
        {{- if .Values.litellm.modelNameOverride }}
          value: "{{ .Values.litellm.modelNameOverride }}"
        {{- else }}
          {{- if .Values.llamacpp.quant }}
          value: "{{ .Values.llamacpp.repoId }}-{{ .Values.llamacpp.quant }}"
          {{- else }}
          value: "{{ .Values.llamacpp.repoId }}"
          {{- end }}
        {{- end }}
        {{- if .Values.litellm.baseUrl}}
        - name: LITELLM_BASE_URL
          value: {{ .Values.litellm.baseUrl }}
        {{- end }}
        {{- if .Values.litellm.baseUrl}}
        - name: LITELLM_KEY
          valueFrom:
            secretKeyRef:
              name: {{ .Release.Name }}-llamacpp-secret
              key: litellm_key
        {{- end }}
        - name: MODEL_ID
        {{- if .Values.llamacpp.quant }}
          value: "{{ .Values.llamacpp.repoId }}-{{ .Values.llamacpp.quant }}"
        {{- else }}
          value: "{{ .Values.llamacpp.repoId }}"
        {{- end }}
        - name: DEPLOYMENT_ID
          value: {{ .Release.Name }}
        - name: PROVIDER
          value: {{ .Values.litellm.provider }}
      {{- end }}
      {{- if .Values.billing.enabled }}
        - name: FLEXPRICE_URL
          value: {{ .Values.billing.url }}
        - name: FLEXPRICE_API_KEY
          valueFrom:
            secretKeyRef:
              name: {{ .Release.Name }}-llamacpp-secret
              key: billing_api_key
        - name: EVENT_NAME
          value: {{ .Values.billing.eventName }}
        - name: EVENT_EXTERNAL_CUSTOMER_ID
          value: {{ .Values.billing.externalCustomerId }}
        - name: HEARTBEAT_INTERVAL
          value: {{ .Values.billing.interval | quote }}
      {{- end }}
      {{- if .Values.litellm.enabled }}
        lifecycle:
          preStop:
            exec:
              command: 
              - sh
              - -c
              - |
                /workspace/cleanup.sh
      {{- end }}
        resources:
          requests:
            cpu: 0.05
            memory: 64Mi
          limits:
            cpu: 0.2
            memory: 256Mi
    {{- end }}
    policy:
    - event: PodFailed
      action: RestartInstance
    - event: OOMKilled
      action: RestartInstance
    - event: PodEvicted
      action: RestartInstance
    - event: Unknown
      action: RestartInstance
  worker:
    spec:
      terminationGracePeriodSeconds: 60
    {{- if eq .Values.system.backend "cuda" }}
      runtimeClassName: nvidia
    {{- end }}
      affinity:
      {{- if .Values.system.nodeAffinityPreferenceKey }}
        podAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  kalavai.job.name: {{ .Values.system.jobId }}
              topologyKey: {{ .Values.system.nodeAffinityPreferenceKey }}
      {{- end }}
      {{- if .Values.system.nodeSelectors }}
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
          {{ if eq .Values.system.nodeSelectorsOps "OR" }}
            {{ range $k, $v := .Values.system.nodeSelectors }}
            - matchExpressions:
              - key: {{$k}}
                operator: In
                values:
                {{ range $v }}
                - "{{ . }}"
                {{ end }}
            {{ end }}
          {{ else }}
            - matchExpressions:
            {{ range $k, $v := .Values.system.nodeSelectors }}
              {{ range $v }}
              - key: {{ $k }}
                operator: In
                values:
                - "{{ . }}"
              {{ end }}
            {{ end }}
          {{ end }}
      {{- end }}
      containers:
      - name: llamacpp-worker
      {{ if eq .Values.system.backend "cuda" }}
        image: ghcr.io/kalavai-net/llamacpp-cuda:{{ .Values.llamacpp.version }}
      {{ else if eq .Values.system.backend "rocm" }}
        image: ghcr.io/kalavai-net/llamacpp-rocm:{{ .Values.llamacpp.version }}
      {{ else }}
        image: ghcr.io/kalavai-net/llamacpp-cpu:{{ .Values.llamacpp.version }}
      {{ end }}
        imagePullPolicy: {{ .Values.llamacpp.imagePullPolicy }}
        command:
        - sh
        - -c
        - |
          /workspace/run_rpc_worker.sh --rpc_port=50052
        env:
        {{- range $key, $value := .Values.system.envFromSecrets }}
        - name: {{ $key }}
          valueFrom:
            secretKeyRef:
              name: {{ $value }}
              key: {{ $key }}
        {{- end }}
        {{- if .Values.hfToken }}
        - name: HF_TOKEN
          valueFrom:
            secretKeyRef:
              name: {{ .Release.Name}}-llamacpp-secret
              key: hf_token
        {{- end }}
        resources:
          requests:
            cpu: {{ .Values.system.cpus}}
            memory: {{ .Values.system.memory}}Gi
          {{ if eq .Values.system.backend "cuda" }}
            nvidia.com/gpu: 1
          {{ else if eq .Values.system.backend "rocm" }}
            amd.com/gpu: 1
          {{ end }}
            ephemeral-storage: {{ .Values.system.workingMemory}}Gi
          limits:
            cpu: {{ .Values.system.cpus}}
            memory: {{ .Values.system.memory}}Gi
          {{ if eq .Values.system.backend "cuda" }}
            nvidia.com/gpu: 1
            # {{ if .Values.system.workerGpuMemory }}
            # nvidia.com/gpumem: {{ .Values.system.workerGpuMemory}}
            # {{ end }}
          {{ else if eq .Values.system.backend "rocm" }}
            amd.com/gpu: 1
          {{ end }}
            ephemeral-storage: {{ .Values.system.workingMemory}}Gi
      restartPolicy: {{ .Values.llamacpp.restartPolicy }}
    policy:
    - event: PodFailed
      action: ReplacePod
    - event: OOMKilled
      action: ReplacePod
    - event: OOMKilled
      action: ReplacePod
    - event: PodEvicted
      action: ReplacePod
    - event: Unknown
      action: ReplacePod
---
{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}-llamacpp-ingress
  labels:
    kalavai.job.name: {{ .Values.system.jobId }}
spec:
  ingressClassName: traefik
  rules:
  - host: {{ .Release.Name }}-{{ .Release.Namespace }}-llamacpp.spaces.kalavai.net
    http:
      paths:
      - backend:
          service:
            name: {{ .Release.Name }}-llamacpp-service
            port:
              number: 8080 # match internal port
        path: /
        pathType: Prefix
{{- end }}