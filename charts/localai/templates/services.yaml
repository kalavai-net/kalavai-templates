{{- if not .Values.localai.distributed }}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-localai-postgres-service
  labels:
    # must have this!
    kalavai.job.name: {{ .Values.system.jobId }}
spec:
  selector:
    app: {{ .Release.Name }}-localai-postgres
    kalavai.job.name: {{ .Values.system.jobId }}
  ports:
    - name: main
      port: 5432
      targetPort: 5432
      protocol: TCP
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-localai-nats-service
  labels:
    # must have this!
    kalavai.job.name: {{ .Values.system.jobId }}
spec:
  selector:
    app: {{ .Release.Name }}-localai-nats
    kalavai.job.name: {{ .Values.system.jobId }}
  ports:
    - name: main
      port: 4222
      targetPort: 4222
      protocol: TCP
    - name: monitor
      port: 8222
      targetPort: 8222
      protocol: TCP
  type: ClusterIP
{{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-localai-service
  labels:
    # must have this!
    kalavai.job.name: {{ .Values.system.jobId }}
spec:
  selector:
    role: leader
    kalavai.job.name: {{ .Values.system.jobId }}
  ports:
    - name: main
      port: 8080
      targetPort: 8080
      protocol: TCP
  {{- if .Values.ingress.enabled }}
  type: ClusterIP
  {{- else }}
  type: NodePort
  {{- end }}
---
{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  # annotations:
  #   traefik.ingress.kubernetes.io/router.middlewares: "{{ .Release.Namespace }}-{{ .Release.Name }}-large-body@kubernetescrd"
  labels:
    kalavai.job.name: {{ .Values.system.jobId }}
  name: {{ .Release.Name }}-localai-ingress
spec:
  ingressClassName: traefik
  rules:
  - host: {{ .Release.Name }}-{{ .Release.Namespace }}-localai.{{ .Values.ingress.subdomain }}
    http:
      paths:
      - backend:
          service:
            name: {{ .Release.Name }}-localai-service
            port:
              number: 8080 # match internal port
        path: /
        pathType: Prefix
{{- end }}