{{- if .Values.watcher.enabled }}
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: {{ .Release.Name}}-watcher-api
  labels:
    kalavai.job.name: {{ .Values.system.jobId}}
spec:
  interval: 10m
  chart:
    spec:
      chart: kalavai-watcher
      version: "{{ .Values.watcher.version}}"
      sourceRef:
        kind: HelmRepository
        name: kalavai-repo-{{ .Release.Name }}
        namespace: {{ .Release.Namespace }}
  values:
    imageTag: {{ .Values.watcher.imageTag}}
    deployment:
      replicas: 1
      staticWorkspace: {{ .Release.Namespace}}
      isSharedPool: False
      inCluster: True
      adminKey: {{ .Values.watcher.adminKey }}
      writeKey: {{ .Values.watcher.writeKey }}
      readonlyKey: {{ .Values.watcher.readonlyKey }}
      useAuthKey: True
      prometheusEndpoint: http://thanos-query-frontend.monitoring:9090
    service:
      type: ClusterIP
    labels:
      kalavai.job.name: {{ .Values.system.jobId}}
{{- end }}
---
{{- if .Values.kalavai-api.enabled }}
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: {{ .Release.Name}}-api
  labels:
    kalavai.job.name: {{ .Values.system.jobId}}
spec:
  interval: 10m
  chart:
    spec:
      chart: kalavai-api
      version: "{{ .Values.kalavai-api.version}}"
      sourceRef:
        kind: HelmRepository
        name: kalavai-repo-{{ .Release.Name }}
        namespace: {{ .Release.Namespace }}
  values:
    bridge:
      replicas: 1
      imageTag: {{ .Values.kalavai-api.imageTag}}
      labels:
        kalavai.job.name: {{ .Values.system.jobId}}
      enabled: true
      watcherApiUrl: {{ .Release.Name}}-watcher-api-service:8000
      watcherApiKey: {{ .Values.watcher.adminKey }}
    {{- if and .Values.kalavai-api.ringfenceNodeLabel .Values.kalavai-api.ringfenceNodeLabelValue }}
      ringfenceNodeLabel: {{ .Values.kalavai-api.ringfenceNodeLabel}}
      ringfenceNodeLabelValue: {{ .Values.kalavai-api.ringfenceNodeLabelValue}}
    {{- end }}
    {{- if .Values.kalavai-api.forcedNamespace }}
      forcedNamespace: {{ .Release.Namespace | default "default" | quote }}
    {{- end }}
    {{- if .Values.kalavai-api.forcedPriority }}
      forcedPriority: {{ .Values.kalavai-api.forcedPriority }}
    {{- end }}
      # service:
      #   type: ClusterIP
{{- end }}