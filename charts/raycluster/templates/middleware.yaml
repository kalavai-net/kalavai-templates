{{- if .Values.ingress.enabled }}
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: {{ .Release.Name }}-strip-prefix
  namespace: {{ .Release.Namespace }}
  labels:
    kalavai.job.name: {{ .Values.system.jobId }}
spec:
  stripPrefix:
    prefixes:
      - /dashboard
      - /gcs
      - /client
      - /serve
{{- end }}
