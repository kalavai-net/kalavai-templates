# This helps make server task available for workers before readiness probe succeeds
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-vllm-server-internal
spec:
  publishNotReadyAddresses: true # This is the magic key
  clusterIP: None # Headless
  selector:
    role: leader
    kalavai.job.name: {{ .Values.system.jobId }}
  ports:
    - port: 6379
---
# deploy NodePort to expose model (if not using LiteLLM registration)
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-vllm-service
  labels:
    # must have this!
    kalavai.job.name: {{ .Values.system.jobId }}
spec:
  selector:
    role: leader
    kalavai.job.name: {{ .Values.system.jobId }}
  ports:
    - name: main
      port: 8080
      targetPort: 8080
      protocol: TCP
  {{- if .Values.ingress.enabled }}
  type: ClusterIP
  {{- else }}
  type: NodePort
  {{- end }}
---
{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  # annotations:
  #   traefik.ingress.kubernetes.io/router.middlewares: "{{ .Release.Namespace }}-{{ .Release.Name }}-large-body@kubernetescrd"
  labels:
    kalavai.job.name: {{ .Values.system.jobId }}
  name: {{ .Release.Name }}-vllm-ingress
spec:
  ingressClassName: traefik
  rules:
  - host: {{ .Release.Name }}-{{ .Release.Namespace }}-vllm.{{ .Values.ingress.subdomain }}
    http:
      paths:
      - backend:
          service:
            name: {{ .Release.Name }}-vllm-service
            port:
              number: 8080 # match internal port
        path: /
        pathType: Prefix
{{- end }}