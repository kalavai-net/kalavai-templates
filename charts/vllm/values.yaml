  key: null

lmcache:
  chunkSize: 256
  localCpu: true
  localDisk: null
  maxLocalCpuSize: 5.0
  maxLocalDiskSize: 0
  remoteUrl: null

billing:
  enabled: false
  url: ""
  apiKey: ""
  eventName: ""
  interval: 0
  externalCustomerId: ""

system:
  queue: default
  replicas: 1
  priorityClassName: user-spot-priority
  nodeSelectors: null
  nodeSelectorsOps: OR
  jobId: null
  envFromSecrets: {}
  nodeAffinityPreferenceKey: null
  workerGpuMemory: null
