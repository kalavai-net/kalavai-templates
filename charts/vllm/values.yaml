modelId: null
hfToken: null

vllm:
  image:
    tag: v0.20.1
  forceVersion: null
  extra: --dtype float16 --enforce-eager
  toolCallParser: llama3_json
  loraModules: null
  templateUrl: null
  modelNameOverride: null
  imagePullPolicy: IfNotPresent
  restartPolicy: Always
  debugLevel: INFO
  autoParallelism: true
  sharedMemory: 6
  githubUsername: null
  githubToken: null

autoscaling:
  enabled: false
  minReplicas: 0
  maxReplicas: 1

service:
  stickySession: true
  stickySessionTimeoutSeconds: 3600
  ingress:
    enabled: false
    subdomain: spaces.kalavai.net

litellm:
  enabled: false
  provider: hosted_vllm
  waitReady: false
  modelNameOverride: null
  accessGroup: null
  baseUrl: null
